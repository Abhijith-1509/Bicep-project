trigger:
  branches:
    include:
      - main
      - feature/*

pr:
  branches:
    include:
      - main
      - feature/*

pool:
  vmImage: 'ubuntu-latest'

stages:

- stage: DeployDev
  jobs:
  - job: DeployDevJob
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'asahi-task-demo'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az deployment group create \
          --resource-group bicep-deployment-rg \
          --template-file main.bicep \
          --parameters @environments/dev.parameters.json